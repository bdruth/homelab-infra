---
- name: Setup dnsdist
  hosts: all
  become: true
  vars_files:
    - vars/main.yml
  vars:
    dnsdist_conf_path: /etc/dnsdist/dnsdist.conf
    custom_lua_path: /etc/dnsdist
    dnsdist_console_key: "{{ lookup('env', 'DNSDIST_CONSOLE_KEY') }}"
    dnsdist_repo_suite: "{{ ansible_facts.distribution_release }}-dnsdist-{{ dnsdist_repo_version }}"

  tasks:
    - name: Reconfigure Timezone Data
      ansible.builtin.shell: timedatectl set-timezone America/Chicago && dpkg-reconfigure -f noninteractive tzdata
      changed_when: false

    - name: Install packages needed before the PowerDNS repo can be added
      ansible.builtin.apt:
        pkg:
          - ca-certificates
          - gnupg
          # dig is used by the VRRP health check and the rolling-restart
          # probes, so it must be present regardless of keepalived being
          # enabled on this node.
          - bind9-dnsutils
          - net-tools
          - rsyslog
        state: present

    ## Debian bookworm ships dnsdist 1.7.3, which is EOL and old enough that
    ## healthCheckMode/lazyHealthCheckMode are silently ignored -- the backends
    ## have been on active health checks despite the config asking for lazy.
    ## There is no dnsdist in bookworm-backports, so the upstream PowerDNS repo
    ## is the only supported path. Repos are per-major, so moving to a later
    ## major means changing dnsdist_repo_version, not just an apt upgrade.
    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install the PowerDNS repository signing key
      ansible.builtin.get_url:
        url: https://repo.powerdns.com/FD380FBB-pub.asc
        dest: /etc/apt/keyrings/dnsdist.asc
        owner: root
        group: root
        mode: "0644"
      register: pdns_repo_key

    - name: Configure the PowerDNS dnsdist repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/dnsdist.list
        content: |
          deb [signed-by=/etc/apt/keyrings/dnsdist.asc] http://repo.powerdns.com/debian {{ dnsdist_repo_suite }} main
        owner: root
        group: root
        mode: "0644"
      register: pdns_repo_list

    ## Without the pin, apt would prefer Debian's older dnsdist on some
    ## resolutions and could silently downgrade the package.
    - name: Pin dnsdist to the PowerDNS repository
      ansible.builtin.copy:
        dest: /etc/apt/preferences.d/dnsdist
        content: |
          Package: dnsdist*
          Pin: origin repo.powerdns.com
          Pin-Priority: 600
        owner: root
        group: root
        mode: "0644"
      register: pdns_repo_pin

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Make sure dnsdist.conf destination dir exists
      ansible.builtin.file:
        path: "{{ dnsdist_conf_path | dirname }}"
        state: directory
        mode: "0755"

    ## Everything below decides whether this converge will disrupt dnsdist, and
    ## drains the VIP first if so. A package upgrade restarts dnsdist as part of
    ## dpkg, so draining only on config change -- as this used to -- would leave
    ## the upgrade itself as an uncontrolled outage on the node holding the VIP.
    # noqa package-latest: check_mode only -- previews whether the pinned
    # major has a newer package, it never installs anything.
    - name: Check whether a dnsdist package change is pending # noqa: package-latest
      ansible.builtin.apt:
        name: dnsdist
        state: latest
        update_cache: false
      check_mode: true
      register: dnsdist_pkg_preview

    - name: Determine whether dnsdist.conf would change
      ansible.builtin.template:
        src: dnsdist.conf.j2
        dest: "{{ dnsdist_conf_path }}"
        owner: root
        group: root
        mode: "0644"
      check_mode: true
      register: dnsdist_conf_preview

    - name: Determine whether this node currently holds the VIP
      ansible.builtin.command: ip -4 addr show dev {{ vrrp_interface | default('eth0') }}
      register: vip_addr_check
      changed_when: false
      when: keepalived_enabled | default(false) | bool

    - name: Set rolling-restart facts
      ansible.builtin.set_fact:
        dnsdist_needs_restart: >-
          {{ dnsdist_pkg_preview.changed or dnsdist_conf_preview.changed }}
        holds_vip: >-
          {{ (keepalived_enabled | default(false) | bool)
             and (vrrp_vip | default('') in (vip_addr_check.stdout | default(''))) }}

    ## Refuse to drain into a void. If the peer cannot resolve, moving the VIP
    ## there would convert a brief restart into a real outage -- better to fail
    ## the deploy loudly and leave the working resolver alone.
    - name: Verify the peer is serving before draining the VIP to it
      ansible.builtin.command: >-
        dig +short +time=2 +tries=2 @{{ vrrp_unicast_peer }} {{ keepalived_check_domain | default('github.com') }} A
      register: peer_health
      changed_when: false
      failed_when: peer_health.stdout is not search('\d+\.\d+\.\d+\.\d+')
      when: holds_vip | bool and dnsdist_needs_restart | bool

    - name: Drain the VIP to the peer before disrupting dnsdist
      ansible.builtin.service:
        name: keepalived
        state: stopped
      when: holds_vip | bool and dnsdist_needs_restart | bool

    - name: Wait for the peer to answer on the VIP
      ansible.builtin.command: >-
        dig +short +time=2 +tries=2 @{{ vrrp_vip }} {{ keepalived_check_domain | default('github.com') }} A
      register: vip_drained
      changed_when: false
      retries: 10
      delay: 2
      until: vip_drained.stdout is search('\d+\.\d+\.\d+\.\d+')
      when: holds_vip | bool and dnsdist_needs_restart | bool

    ## state=latest within the pinned major, so security patches land without
    ## needing a repo change. Moving major is a deliberate dnsdist_repo_version
    ## edit.
    ## noqa package-latest: intentional. The apt pin constrains this to the
    ## dnsdist_repo_version major, so `latest` only ever moves within a train --
    ## it cannot jump majors. 2.0.x has shipped several CVE fixes, and a
    ## resolver on the network edge should pick those up without waiting for
    ## someone to bump a version pin. The rolling-drain above makes the
    ## resulting restart safe.
    ##
    ## Accepted trade-off: if a patch release lands between converging node 1
    ## and node 2, the pair can sit on different patch versions until the next
    ## run. Same train, and preferable to delaying security fixes.
    - name: Install/upgrade dnsdist from the PowerDNS repository # noqa: package-latest
      ansible.builtin.apt:
        name: dnsdist
        state: latest
        update_cache: false
      register: dnsdist_pkg

    - name: Create dnsdist.conf
      ansible.builtin.template:
        src: dnsdist.conf.j2
        dest: "{{ dnsdist_conf_path }}"
        owner: root
        group: root
        mode: "0644"
      register: dnsdist_conf

    ## The custom orderedwrandom.lua policy was replaced by the built-in
    ## orderedWrandUntag; remove the stale file so it cannot be dofile'd by an
    ## older config left behind on the host.
    - name: Remove the superseded custom Lua policy
      ansible.builtin.file:
        path: "{{ custom_lua_path }}/orderedwrandom.lua"
        state: absent

    - name: Restart dnsdist
      ansible.builtin.service:
        name: dnsdist
        state: restarted
      when: dnsdist_needs_restart | bool or dnsdist_conf.changed

    - name: Wait for dnsdist to resolve again before taking the VIP back
      ansible.builtin.command: >-
        dig +short +time=2 +tries=2 @127.0.0.1 {{ keepalived_check_domain | default('github.com') }} A
      register: local_dnsdist
      changed_when: false
      retries: 10
      delay: 2
      until: local_dnsdist.stdout is search('\d+\.\d+\.\d+\.\d+')
      when: dnsdist_needs_restart | bool

    ## keepalived carries nopreempt, so restarting it here does not snatch the
    ## VIP back from the peer -- this node rejoins as backup and the VIP stays
    ## put. That is what keeps a full rolling update to a single handover
    ## rather than one per node.
    - name: Restore keepalived after the rolling restart
      ansible.builtin.service:
        name: keepalived
        state: started
      when: holds_vip | bool and dnsdist_needs_restart | bool

    ## The restart above is conditional on config change, so a dnsdist that is
    ## stopped for any other reason stays stopped through a converge. On a node
    ## holding the DNS VIP that is precisely the state we cannot leave behind.
    - name: Ensure dnsdist is enabled and running
      ansible.builtin.service:
        name: dnsdist
        state: started
        enabled: true

    # - name: Print all available facts
    #   ansible.builtin.debug:
    #     var: ansible_facts

    - name: Create rsyslog configuration file for dnsdist
      ansible.builtin.copy:
        dest: /etc/rsyslog.d/dnsdist.conf
        content: |
          :syslogtag, startswith, "dnsdist" action(type="omfwd" target="{{ remote_syslog_server }}" port="{{ remote_syslog_server_port }}" protocol="udp")
        owner: root
        group: root
        mode: "0644"
      notify: Restart rsyslog

    ## keepalived is gated so the same playbook can run unchanged against the
    ## original single node, which must not claim a VIP. Only the HA pair sets
    ## keepalived_enabled, via -e from the terraform provisioner.
    - name: Install keepalived packages
      ansible.builtin.apt:
        pkg:
          - keepalived
        state: present
      when: keepalived_enabled | default(false) | bool

    - name: Install dnsdist health check script
      ansible.builtin.template:
        src: check_dnsdist.sh.j2
        dest: /usr/local/bin/check_dnsdist.sh
        owner: root
        group: root
        mode: "0755"
      when: keepalived_enabled | default(false) | bool
      register: keepalived_check_script

    - name: Create keepalived.conf
      ansible.builtin.template:
        src: keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: "0644"
      when: keepalived_enabled | default(false) | bool
      register: keepalived_conf

    - name: Enable and restart keepalived # noqa: no-handler
      ansible.builtin.service:
        name: keepalived
        state: restarted
        enabled: true
      when:
        - keepalived_enabled | default(false) | bool
        - keepalived_conf.changed or keepalived_check_script.changed

    ## Tailscale runs last, after dnsdist is installed and serving. It used to
    ## run first, which meant an expired tailscale_authkey aborted the play
    ## before dnsdist was ever installed -- a dead key took out DNS entirely
    ## rather than just leaving the node off the tailnet. Tailscale is for
    ## remote administration here (--accept-dns=false, userspace networking);
    ## DNS service does not depend on it, so it belongs after the thing that
    ## actually matters.
    - name: Configure tailscaled for userspace networking
      ansible.builtin.copy:
        dest: /etc/default/tailscaled
        content: |
          # Userspace networking for LXC containers without TUN device access
          PORT="41641"
          FLAGS="--tun=userspace-networking"
        owner: root
        group: root
        mode: "0644"

    - name: Install and configure Tailscale
      ansible.builtin.include_role:
        name: artis3n.tailscale.machine
      vars:
        tailscale_args: "--accept-dns=false"

  handlers:
    - name: Restart rsyslog
      ansible.builtin.systemd:
        name: rsyslog
        state: restarted
