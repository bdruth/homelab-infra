---
- name: Setup dnsdist
  hosts: all
  become: true
  vars_files:
    - vars/main.yml
  vars:
    dnsdist_conf_path: /etc/dnsdist/dnsdist.conf
    custom_lua_path: /etc/dnsdist
    dnsdist_console_key: "{{ lookup('env', 'DNSDIST_CONSOLE_KEY') }}"

  tasks:
    - name: Reconfigure Timezone Data
      ansible.builtin.shell: timedatectl set-timezone America/Chicago && dpkg-reconfigure -f noninteractive tzdata
      changed_when: false

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install APT packages
      ansible.builtin.apt:
        pkg:
          - dnsdist
          - net-tools
          - rsyslog
        state: present

    - name: Make sure dnsdist.conf destination dir exists
      ansible.builtin.file:
        path: "{{ dnsdist_conf_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Create dnsdist.conf
      ansible.builtin.template:
        src: dnsdist.conf.j2
        dest: "{{ dnsdist_conf_path }}"
        owner: root
        group: root
        mode: "0644"
      register: dnsdist_conf

    - name: Make sure custom lua path dir exists
      ansible.builtin.file:
        path: "{{ custom_lua_path }}"
        state: directory
        mode: "0755"

    - name: Create orderedwrandom Lua policy
      ansible.builtin.copy:
        src: orderedwrandom.lua
        dest: "{{ custom_lua_path }}/orderedwrandom.lua"
        owner: root
        group: root
        mode: "0644"
      register: orderedwrandom_lua

    - name: Restart dnsdist
      ansible.builtin.service:
        name: dnsdist
        state: restarted
      when: dnsdist_conf.changed or orderedwrandom_lua.changed

    # - name: Print all available facts
    #   ansible.builtin.debug:
    #     var: ansible_facts

    - name: Create rsyslog configuration file for dnsdist
      ansible.builtin.copy:
        dest: /etc/rsyslog.d/dnsdist.conf
        content: |
          :syslogtag, startswith, "dnsdist" action(type="omfwd" target="{{ remote_syslog_server }}" port="{{ remote_syslog_server_port }}" protocol="udp")
        owner: root
        group: root
        mode: "0644"
      notify: Restart rsyslog

    ## keepalived is gated so the same playbook can run unchanged against the
    ## original single node, which must not claim a VIP. Only the HA pair sets
    ## keepalived_enabled, via -e from the terraform provisioner.
    - name: Install keepalived packages
      ansible.builtin.apt:
        pkg:
          - keepalived
          - bind9-dnsutils
        state: present
      when: keepalived_enabled | default(false) | bool

    - name: Install dnsdist health check script
      ansible.builtin.template:
        src: check_dnsdist.sh.j2
        dest: /usr/local/bin/check_dnsdist.sh
        owner: root
        group: root
        mode: "0755"
      when: keepalived_enabled | default(false) | bool
      register: keepalived_check_script

    - name: Create keepalived.conf
      ansible.builtin.template:
        src: keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: "0644"
      when: keepalived_enabled | default(false) | bool
      register: keepalived_conf

    - name: Enable and restart keepalived # noqa: no-handler
      ansible.builtin.service:
        name: keepalived
        state: restarted
        enabled: true
      when:
        - keepalived_enabled | default(false) | bool
        - keepalived_conf.changed or keepalived_check_script.changed

    ## Tailscale runs last, after dnsdist is installed and serving. It used to
    ## run first, which meant an expired tailscale_authkey aborted the play
    ## before dnsdist was ever installed -- a dead key took out DNS entirely
    ## rather than just leaving the node off the tailnet. Tailscale is for
    ## remote administration here (--accept-dns=false, userspace networking);
    ## DNS service does not depend on it, so it belongs after the thing that
    ## actually matters.
    - name: Configure tailscaled for userspace networking
      ansible.builtin.copy:
        dest: /etc/default/tailscaled
        content: |
          # Userspace networking for LXC containers without TUN device access
          PORT="41641"
          FLAGS="--tun=userspace-networking"
        owner: root
        group: root
        mode: "0644"

    - name: Install and configure Tailscale
      ansible.builtin.include_role:
        name: artis3n.tailscale.machine
      vars:
        tailscale_args: "--accept-dns=false"

  handlers:
    - name: Restart rsyslog
      ansible.builtin.systemd:
        name: rsyslog
        state: restarted
