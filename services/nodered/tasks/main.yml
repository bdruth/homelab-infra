---
# Node-RED provisioning tasks
# Targets a fresh host (future LXC). Does NOT assume the homebridge compose stack.
# All tasks are gated on install_nodered | bool.

- name: Verify docker compose is available
  ansible.builtin.command: docker compose version
  register: nodered_compose_check
  changed_when: false
  ignore_errors: true
  when: install_nodered | bool

- name: Fail if docker compose is not available
  ansible.builtin.fail:
    msg: >-
      Docker compose is not available. Ensure podman + podman-docker are installed
      and the docker shim is on PATH.
  when:
    - install_nodered | bool
    - nodered_compose_check.rc != 0

- name: Create node-red group
  ansible.builtin.group:
    name: "{{ nodered_group }}"
    gid: "{{ nodered_gid }}"
    system: true
    state: present
  when: install_nodered | bool

- name: Create node-red user
  ansible.builtin.user:
    name: "{{ nodered_user }}"
    uid: "{{ nodered_uid }}"
    group: "{{ nodered_group }}"
    home: "{{ nodered_install_dir }}"
    shell: /bin/false
    system: true
    create_home: false
    state: present
  when: install_nodered | bool

- name: Create Node-RED workdir (state placeholder — Phase 4 syncs actual data)
  ansible.builtin.file:
    path: "{{ nodered_install_dir }}"
    state: directory
    owner: "{{ nodered_user }}"
    group: "{{ nodered_group }}"
    mode: "0755"
  when: install_nodered | bool

- name: Create Node-RED compose directory
  ansible.builtin.file:
    path: "{{ nodered_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: install_nodered | bool

- name: Deploy Node-RED docker-compose file
  ansible.builtin.template:
    src: nodered-compose.yml.j2
    dest: "{{ nodered_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  register: nodered_config_updated
  when: install_nodered | bool

- name: Deploy Node-RED systemd service unit
  ansible.builtin.template:
    src: nodered.service.j2
    dest: /etc/systemd/system/nodered.service
    owner: root
    group: root
    mode: "0644"
  register: nodered_service_file_updated
  when: install_nodered | bool

- name: Reload systemd daemon when unit file changed
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - install_nodered | bool
    - nodered_service_file_updated is changed

- name: Enable and start (or restart) Node-RED service
  ansible.builtin.systemd:
    name: nodered
    enabled: true
    state: >-
      {{
        'restarted'
        if (nodered_service_file_updated is changed or nodered_config_updated is changed)
        else 'started'
      }}
    daemon_reload: true
  register: nodered_service
  when: install_nodered | bool

- name: Wait for Node-RED container to start
  ansible.builtin.shell: |
    set -o pipefail
    podman ps --format '{{ "{{" }}.Names{{ "}}" }}' | grep -q nodered
  args:
    executable: /bin/bash
  register: nodered_container_check
  changed_when: false
  ignore_errors: true
  retries: 15
  delay: 4
  until: nodered_container_check.rc == 0
  when: install_nodered | bool
