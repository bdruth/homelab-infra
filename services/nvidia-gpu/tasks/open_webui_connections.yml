---
# Open WebUI OpenAI-Connection Provisioning
#
# Open WebUI persists its OpenAI connection list in /app/backend/data/webui.db
# (PersistentConfig). Environment variables only seed it on first run; after
# that, the DB takes precedence. To keep the connection list reproducible
# across redeploys we POST the desired state to /openai/config/update on
# every Ansible run.
#
# This requires a one-time admin API token bootstrap. Steps for first deploy:
#   1. Log into Open WebUI as an admin (via Authelia OIDC).
#   2. Click avatar -> Settings -> Account -> API Keys -> Create new key.
#   3. Store the key in services/nvidia-gpu/vars/main.yml (git-crypt protected)
#      as `open_webui_admin_api_token`.
#
# The task is a no-op when the token is empty, so initial deploys before the
# bootstrap don't fail.

- name: Skip Open WebUI connection provisioning when no admin token configured
  ansible.builtin.debug:
    msg: >-
      Skipping Open WebUI connection provisioning because
      open_webui_admin_api_token is empty. See
      services/nvidia-gpu/tasks/open_webui_connections.yml for bootstrap steps.
  when: open_webui_admin_api_token | default('') | length == 0

- name: Provision Open WebUI OpenAI connections
  when: open_webui_admin_api_token | default('') | length > 0
  block:
    - name: Wait for Open WebUI HTTP service to be ready
      ansible.builtin.uri:
        url: "http://localhost:{{ open_webui_port }}/health"
        method: GET
        status_code: 200
        timeout: 10
      register: open_webui_health
      retries: 30
      delay: 5
      until: open_webui_health.status == 200

    - name: Build OPENAI_API_CONFIGS dict (config-only fields, keyed by index)
      ansible.builtin.set_fact:
        _open_webui_openai_configs: >-
          {{
            _open_webui_openai_configs | default({}) | combine({
              (item_index | string):
                (item_value | dict2items
                  | rejectattr('key', 'in', ['url', 'key'])
                  | items2dict)
            })
          }}
      loop: "{{ open_webui_connections }}"
      loop_control:
        index_var: item_index
        loop_var: item_value
        label: "{{ item_value.url }}"

    - name: POST desired connection config to Open WebUI
      ansible.builtin.uri:
        url: "http://localhost:{{ open_webui_port }}/openai/config/update"
        method: POST
        headers:
          Authorization: "Bearer {{ open_webui_admin_api_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          ENABLE_OPENAI_API: true
          OPENAI_API_BASE_URLS: "{{ open_webui_connections | map(attribute='url') | list }}"
          OPENAI_API_KEYS: "{{ open_webui_connections | map(attribute='key') | list }}"
          OPENAI_API_CONFIGS: "{{ _open_webui_openai_configs }}"
        status_code: 200
        timeout: 15
      register: open_webui_config_post
      no_log: true
      changed_when: true

    - name: Report Open WebUI connection provisioning
      ansible.builtin.debug:
        msg: >-
          Provisioned {{ open_webui_connections | length }} OpenAI connection(s)
          on Open WebUI ({{ open_webui_connections | map(attribute='url') | list }}).
