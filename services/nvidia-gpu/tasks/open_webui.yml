---
# Open WebUI Tasks

- name: Create Open WebUI base directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop:
    - "{{ open_webui_install_dir }}"
    - "{{ open_webui_install_dir }}/data"

- name: Create systemd service for Open WebUI
  ansible.builtin.template:
    src: open-webui.service.j2
    dest: /etc/systemd/system/open-webui.service
    owner: root
    group: root
    mode: "0644"
  register: open_webui_service_file
  notify:
    - Reload systemd
    - Restart Open WebUI service

- name: Enable and start Open WebUI service
  ansible.builtin.systemd:
    name: open-webui
    enabled: true
    state: started
    daemon_reload: true
  register: open_webui_service
  ignore_errors: "{{ ansible_check_mode }}"

# Trigger any pending handler so the container is restarted before we POST to
# its API in the next task; avoids posting connection config to the old
# instance about to be killed.
- name: Flush Open WebUI handlers before connection provisioning
  ansible.builtin.meta: flush_handlers

- name: Import Open WebUI connection-provisioning tasks
  ansible.builtin.import_tasks: open_webui_connections.yml
  when:
    - open_webui_connections is defined
    - open_webui_connections | length > 0
