---
name: Copilot API Image Build

# Builds the homelab fork of copilot-api into a container image and pushes
# it to the Gitea container registry, where the nvidia-gpu Ansible role
# pulls it from. The fork tracks ericc-ch/copilot-api with patches for
# GPT-5.x model support (max_completion_tokens translation and a /v1/responses
# route).
#
# Trigger manually (workflow_dispatch) when a new release is desired, or
# rely on the weekly schedule. Pinning is done via the workflow ref input;
# the default builds the fork's main branch.

"on":
  workflow_dispatch:
    inputs:
      ref:
        description: "Fork git ref to build (branch, tag, or commit SHA)"
        required: false
        default: "main"
      image_tag:
        description: "Image tag to publish (in addition to the commit SHA tag)"
        required: false
        default: "latest"
  schedule:
    - cron: "0 5 * * 1" # Weekly on Mondays at 05:00 UTC

env:
  IMAGE_NAME: copilot-api
  # Homelab fork. The original is ericc-ch/copilot-api on github.com.
  FORK_REPO_PATH: bruth/copilot-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Install docker CLI
        # The Gitea Act Runner job container (node:20-bookworm) ships git/node
        # but no docker. The runner config bind-mounts the host docker socket
        # into the job container; here we just need the CLI to talk to it.
        run: |
          set -eux
          if ! command -v docker >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends docker.io
          fi
          docker version

      - name: Resolve inputs
        id: inputs
        run: |
          REF="${{ github.event.inputs.ref }}"
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$REF" ]; then REF="main"; fi
          if [ -z "$TAG" ]; then TAG="latest"; fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Clone copilot-api fork
        # Plain git clone instead of actions/checkout@v4: the action's default
        # token semantics don't compose with our setup. The fork is public so
        # no auth is required.
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
        run: |
          git clone --depth 1 --branch "${{ steps.inputs.outputs.ref }}" \
            "https://${REGISTRY_HOST}/${{ env.FORK_REPO_PATH }}.git" copilot-api

      - name: Resolve commit SHA
        id: sha
        run: |
          cd copilot-api
          SHA="$(git rev-parse --short HEAD)"
          echo "short_sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./copilot-api
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:${{ steps.inputs.outputs.tag }}
            ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_OWNER }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short_sha }}

      - name: pushover-actions
        uses: umahmood/pushover-actions@main
        if: ${{ vars.isLocal != 'true' && failure() }}
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        with:
          status: ${{ job.status }}
          title: "${{ github.workflow }}"
          message: "${{ job.status }} - upstream ref ${{ steps.inputs.outputs.ref }} (${{ steps.sha.outputs.short_sha }})"
