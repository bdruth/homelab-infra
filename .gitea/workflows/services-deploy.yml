---
name: Services Deployment Workflow

"on":
  push:
    branches: [main]
    paths:
      - "services/**"
      # pihole and dnsdist live under services/ but are deployed by
      # infrastructure-deploy.yml (via terraform), not by this workflow --
      # neither appears in infrastructure-test.yml or the services inventory.
      # Without these exclusions every DNS change produced two runs, one of
      # which was always a no-op, which makes it easy to misread a red/green
      # status as belonging to the deploy that mattered.
      #
      # Negated patterns are supported by Gitea's workflow pattern engine
      # (gitea.com/gitea/act, since Gitea 1.19.1) and follow GitHub semantics:
      # last matching pattern wins, so a commit touching pihole AND another
      # service still triggers this workflow.
      - "!services/pihole/**"
      - "!services/dnsdist/**"
      - "!services/matterbridge/**"
      - "setup-ansible.sh"
      - "services-deploy.sh"
      - "services-pkgx-deploy.sh"
      - ".gitea/workflows/services-deploy.yml"

jobs:
  services-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unlock git-crypt
        if: ${{ vars.isLocal != 'true' }}
        uses: sliteteam/github-action-git-crypt-unlock@1.3.0
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}

      - name: setup-pkgx
        uses: pkgxdev/setup@v4
        with:
          +: ansible
            ssh
            python

      - name: Install dependencies
        run: |
          echo "Cache hit: ${{ steps.cache.outputs.cache-hit }}"
          apt-get update
          apt-get install -y dnsutils netcat-traditional git-crypt

      - name: check-changes
        id: check_changes
        run: |
          echo "Checking for relevant file changes..."
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.event.after || github.sha }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            DIFF_RANGE="HEAD~1"
          else
            DIFF_RANGE="$BEFORE_SHA..$AFTER_SHA"
          fi
          if git diff --name-only "$DIFF_RANGE" | grep -E "^(services/|setup-ansible\.sh|services-deploy\.sh|services-pkgx-deploy\.sh|services-deploy\.yml)"; then
            echo "✅ Services files changed, proceeding with deployment"
            # Create a file to track which playbooks should be deployed
            rm -f .deploy_playbooks 2>/dev/null || true
            touch .deploy_playbooks

            echo "Detecting which roles were changed..."

            # Check for changes in common files that should trigger full deployment
            if git diff --name-only "$DIFF_RANGE" | \
               grep -E "^(services/inventory\.yml|services/infrastructure(-test)?\.yml|services/ansible\.cfg|setup-ansible\.sh|services-deploy\.sh)"; then
              echo "✅ Common services files changed, will run full deployment"
              echo "FULL_DEPLOYMENT" > .deploy_playbooks
              echo "deploy_full=yes" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # This list must stay in sync with the roles imported by
            # services/infrastructure-test.yml. fission, microk8s and nats were
            # missing: they deploy in full runs but a change confined to one of
            # them matched nothing here, so the run went green having deployed
            # nothing at all.
            #
            # Check for each role directory and add to deploy list if changed.
            # grep exits 1 when nothing matches, which under `-e -o pipefail` would
            # fail the step before the PLAYBOOK_COUNT check below can report the
            # no-op. Roles owned by infrastructure-deploy.yml (pihole, dnsdist)
            # legitimately match nothing here.
            git diff --name-only "$DIFF_RANGE" \
              | { grep -E "^services/(disk-monitoring|drone|fission|gitea|microk8s|nats|nut|nvidia-gpu|watchtower|coder)" || true; } \
              | sed -E 's#^services/(disk-monitoring|drone-runner-exec|drone|fission|gitea-act-runner|gitea|microk8s|nats|nut|nvidia-gpu|watchtower|coder).*#services/\1/test-playbook.yml#' \
              | sort -u > .deploy_playbooks

            # Count how many playbooks will be deployed
            PLAYBOOK_COUNT=$(wc -l < .deploy_playbooks)
            if [ "$PLAYBOOK_COUNT" -gt 0 ]; then
              echo "✅ Will deploy ${PLAYBOOK_COUNT} role(s)"
              echo "deploy_partial=yes" >> "$GITHUB_OUTPUT"
            else
              echo "ℹ️ No specific roles changed"
            fi
            exit 0
          else
            echo "ℹ️ No relevant Ansible files changed, skipping deployment"
          fi

      - name: deploy-roles
        if: steps.check_changes.outputs.deploy_full == 'yes'
        run: |
          echo '${{ secrets.SSH_PRIVATE_KEY }}' > id_rsa.tmp
          chmod 600 id_rsa.tmp

          ./services-pkgx-deploy.sh --playbook=services/infrastructure-test.yml "--private-key id_rsa.tmp"

      - name: deploy-changed-roles
        if: steps.check_changes.outputs.deploy_partial == 'yes'
        run: |
          echo '${{ secrets.SSH_PRIVATE_KEY }}' > id_rsa.tmp
          chmod 600 id_rsa.tmp

          while IFS= read -r playbook; do
            echo "Deploying $playbook"
            ./services-pkgx-deploy.sh --playbook="$playbook" "--private-key id_rsa.tmp"
          done < .deploy_playbooks

      - name: pushover-actions
        uses: umahmood/pushover-actions@main
        if: ${{ vars.isLocal != 'true' && failure() }}
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
        with:
          status: ${{ job.status }}
          title: "${{ github.workflow }}"
          message: "${{ job.status }} - ${{ github.actor }} - ${{ github.event.head_commit.message }}"
